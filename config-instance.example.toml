# Application environment label used by the service at runtime.
environment = "local"

###
# Web server and WebSocket server settings.
###
[server]
# HTTP port used for inbound HTTP requests forwarded through Tunnelmole.
# server.httpPort = 8000
httpPort = 8000

# WebSocket port used by Tunnelmole clients to connect to the service.
# IMPORTANT: when running in Docker/containers this must remain 8080 inside the container.
# To use a different external port, keep this at 8080 and change Docker port mapping (for example -p 9000:8080).
# server.websocketPort = 8080
websocketPort = 8080

# Base domain used to generate assigned hostnames.
# server.domain = "localhost"
domain = "localhost"

# Require API keys for every new connection, including random hostnames.
# When false, only explicitly requested subdomains/domains require an API key.
# server.requireApiKeyForAllConnections = true
requireApiKeyForAllConnections = true

# Allow clients to request arbitrary domains through the initialise domain field.
# When false, only hostnames under server.domain are accepted from domain and all
# other custom domain requests fall back to a random generated hostname.
# server.allowCustomDomains = true
allowCustomDomains = true

# Password for protected admin/debug endpoints (like /tunnelmole-connections).
# server.password = "changeme"
password = "changeme"

# Maximum accepted inbound HTTP request size for proxied requests.
# Uses body-parser raw limit format (e.g. "5mb", "10mb", "1gb").
# server.maxRequestSize = "5mb"
maxRequestSize = "5mb"

# Banned source IP addresses. Matching clients are shadow banned.
# server.bannedIps = ["203.0.113.10"]
bannedIps = [
    "999.999.999.999",
]

# Banned client IDs. Matching clients are shadow banned.
# server.bannedClientIds = ["df3453rewr349543utff"]
bannedClientIds = [
    "df3453rewr349543utff"
]

# Banned hostnames for reverse DNS checks. Matching clients are shadow banned.
# server.bannedHostnames = ["evil.com"]
bannedHostnames = [
    "evil.com"
]

###
# MySQL configuration used only when runtime.enableLogging is true.
###
[mysql]
# MySQL hostname or IP.
# mysql.host = "localhost"
host = "localhost"

# MySQL username.
# mysql.user = "root"
user = "root"

# MySQL password.
# mysql.password = "changeme"
password = "changeme"

# MySQL database name used by telemetry/client log tables.
# mysql.database = "tunnelmole"
database = "tunnelmole"

###
# Runtime behavior controls.
###
[runtime]
# Enable verbose debug logging to stdout.
# runtime.debug = true
debug = true

# Enable database-backed logging/telemetry writes.
# runtime.enableLogging = false
enableLogging = false

# Maximum connection lifetime in seconds before terminating a websocket.
# Default in code is 43200 (12 hours) if omitted.
# runtime.connectionTimeout = 43200
connectionTimeout = 43200

# Frequency in milliseconds for timeout checks over active websocket clients.
# Default in code is 45000 ms if omitted.
# runtime.timeoutCheckFrequency = 5000
timeoutCheckFrequency = 5000
